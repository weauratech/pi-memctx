name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.3.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - uses: oven-sh/setup-bun@v2

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v1.2.3. Got: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version $VERSION does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install --omit=optional --omit=peer --ignore-scripts --no-audit --no-fund --package-lock=false

      - name: Run CI
        run: npm run ci

      - name: Extract changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk "
            /^## \\[$VERSION\\]/ { found=1; print; next }
            /^## \\[/ && found { exit }
            found { print }
          " CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No changelog section found for $VERSION" >&2
            exit 1
          fi

      - name: Pack
        id: pack
        shell: bash
        run: |
          npm pack --json > pack.json
          FILE="$(node -e "console.log(require('./pack.json')[0].filename)")"
          shasum -a 256 "$FILE" > "$FILE.sha256"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "pi-memctx@$VERSION" version >/dev/null 2>&1; then
            echo "pi-memctx@$VERSION is already published on npm. Skipping publish."
            exit 0
          fi

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured. Skipping npm publish; rerun this workflow after adding the secret."
            exit 0
          fi

          npm publish "${{ steps.pack.outputs.file }}" --provenance --access public

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE="@weauratech/pi-memctx"
          REGISTRY="https://npm.pkg.github.com"

          cat > ~/.npmrc <<EOF
          @weauratech:registry=$REGISTRY
          //npm.pkg.github.com/:_authToken=$NODE_AUTH_TOKEN
          EOF

          if npm view "$PACKAGE@$VERSION" version --registry="$REGISTRY" >/dev/null 2>&1; then
            echo "$PACKAGE@$VERSION is already published on GitHub Packages. Skipping publish."
            exit 0
          fi

          rm -rf github-package
          mkdir github-package
          tar -xzf "${{ steps.pack.outputs.file }}" -C github-package

          node <<'NODE'
          const fs = require("fs");
          const path = "github-package/package/package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          pkg.name = "@weauratech/pi-memctx";
          pkg.publishConfig = { registry: "https://npm.pkg.github.com" };
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          NODE

          cd github-package/package
          npm publish --registry="$REGISTRY"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file RELEASE_NOTES.md
            gh release upload "$TAG" \
              "${{ steps.pack.outputs.file }}" \
              "${{ steps.pack.outputs.file }}.sha256" \
              --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file RELEASE_NOTES.md \
              "${{ steps.pack.outputs.file }}" \
              "${{ steps.pack.outputs.file }}.sha256"
          fi
