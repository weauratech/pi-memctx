name: Bug report
description: Report a reproducible problem with pi-memctx
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, tokens, private memory-pack content, proprietary code, customer data, or sensitive logs. Prefer sanitized examples or synthetic fixtures.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and observed behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install with ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Pi version/commit:
        - pi-memctx version/commit:
        - Node version:
        - Bun version:
        - qmd available? yes/no
        - Install source: npm/git/local
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Public-safe logs or screenshots
      description: Remove secrets, private memory content, proprietary code, customer data, and private paths before sharing.
  - type: textarea
    id: memctx-status
    attributes:
      label: pi-memctx status/config
      description: Optional. Paste public-safe output from /memctx-profile status or npx pi-memctx doctor.
      placeholder: |
        - profile: gateway
        - retrieval: balanced
        - learn: auto/off/confirm
        - search: qmd or grep fallback
