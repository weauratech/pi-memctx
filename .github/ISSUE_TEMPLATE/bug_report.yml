name: Bug report
description: Report a reproducible problem with pi-memctx
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, tokens, private memory-pack content, or sensitive data.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and observed behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install with ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Node version:
        - Bun version:
        - Pi version/commit:
        - pi-memctx version/commit:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Public-safe logs or screenshots
      description: Remove secrets and private memory content before sharing.
