name: Feature request
description: Suggest an improvement to pi-memctx
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Do not include secrets, private memory-pack content, proprietary code, customer data, or sensitive logs.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Memory Gateway / retrieval
        - Automatic learning / persistence
        - Pack generation / enrichment
        - Commands / UX
        - Benchmarking
        - Documentation
        - Other
  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: Who benefits, and what workflow changes?
  - type: textarea
    id: examples
    attributes:
      label: Public-safe examples
      description: Optional. Include sanitized examples, screenshots, or links to public projects.
